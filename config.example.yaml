telegram:
  botToken: ""
  apiId: 0
  apiHash: ""
  session: ""

llm:
  apiBaseUrl: ""
  apiKey: ""
  model: "claude-opus-4-6"
  maxContextTokens: 512000
  reasoningSignatureCompat: "anthropic"

driver:
  chatIds: []

database:
  path: "./data/cahciua.db"

compaction:
  enabled: true
  workingWindowTokens: 8000
  compactModel: ""        # optional: override model for compaction calls
  dryRun: false            # true = call LLM and log summary, but don't apply

# All feature flags should be enabled in local dev config.
features:
  trimStaleNoToolCallTurnResponses: false
  trimSelfMessagesCoveredBySendToolCalls: false
  trimToolResults: false
